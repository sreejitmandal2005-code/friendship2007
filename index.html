<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic Memory Album</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
transition:0.4s;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff9ec4,#ffd6ec,#c8f7ff);
overflow-x:hidden;
padding:20px;
}

/* 🌙 Dark Mode */
body.dark{
background:linear-gradient(135deg,#1a001f,#2b0033,#000814);
color:white;
}

body.dark .form-box,
body.dark .album{
background:rgba(0,0,0,0.6);
color:white;
}

h1{
text-align:center;
color:white;
margin-bottom:20px;
text-shadow:0 3px 10px rgba(0,0,0,0.3);
}

/* Toggle Button */
.toggle-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#000;
color:white;
cursor:pointer;
z-index:999;
}

/* Quotes Slider */
.quote-box{
text-align:center;
font-size:18px;
margin-bottom:20px;
font-style:italic;
color:#fff;
height:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.form-box{
background:rgba(255,255,255,0.9);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin-bottom:30px;
}

.form-box input, .form-box button{
padding:12px;
margin:10px 0;
width:100%;
border-radius:8px;
border:none;
outline:none;
}

.form-box input{
background:#f8f8ff;
}

.form-box button{
background:linear-gradient(45deg,#ff4d88,#ff85a2);
color:white;
font-weight:bold;
cursor:pointer;
}

.album{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
margin-bottom:40px;
animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.album h2{
color:#ff4d88;
margin-bottom:15px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.gallery img:hover{
transform:scale(1.07);
box-shadow:0 8px 25px rgba(255,0,100,0.4);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal img{
max-width:90%;
max-height:85%;
border-radius:15px;
}

.close{
position:absolute;
top:25px;
right:35px;
color:white;
font-size:35px;
cursor:pointer;
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleDarkMode()">🌙</button>

<h1>💖 Our Romantic & Friendship Memories 💕</h1>

<div class="quote-box" id="quoteBox"></div>

<div class="container">

<div class="form-box">
<input type="text" id="albumTitle" placeholder="Album Title">
<input type="date" id="albumDate">
<input type="password" id="albumPassword" placeholder="Set Password (optional)">
<input type="file" id="albumImages" multiple>
<button onclick="createAlbum()">Create Memory Album 💝</button>
</div>

<div id="albumsContainer"></div>

</div>

<div class="modal" id="imageModal">
<span class="close" onclick="closeModal()">✖</span>
<img id="modalImg">
</div>

<script>

/* 🌙 Dark Mode */
function toggleDarkMode(){
document.body.classList.toggle("dark");
}

/* 💌 Quotes Slider */
const quotes=[
"True friendship is never apart 💕",
"Every memory with you is priceless 💖",
"Together forever, no matter what 💞",
"Best friends are soul sisters 💘",
"Our story is my favorite 💝"
];

let quoteIndex=0;
function changeQuote(){
document.getElementById("quoteBox").innerText=quotes[quoteIndex];
quoteIndex=(quoteIndex+1)%quotes.length;
}
setInterval(changeQuote,3000);
changeQuote();

/* 📸 Create Album with Password Protection */
function createAlbum(){
let title=document.getElementById("albumTitle").value;
let date=document.getElementById("albumDate").value;
let password=document.getElementById("albumPassword").value;
let files=document.getElementById("albumImages").files;

if(title===""||date===""||files.length===0){
alert("Please fill all fields 💕");
return;
}

let albumDiv=document.createElement("div");
albumDiv.className="album";

let heading=document.createElement("h2");
heading.innerText="💞 "+title+" - "+date;
albumDiv.appendChild(heading);

let gallery=document.createElement("div");
gallery.className="gallery";

if(password!==""){
let lockBtn=document.createElement("button");
lockBtn.innerText="🔒 Unlock Album";
lockBtn.onclick=function(){
let userPass=prompt("Enter album password 💌");
if(userPass===password){
gallery.style.display="grid";
lockBtn.remove();
}else{
alert("Wrong Password 💔");
}
};
albumDiv.appendChild(lockBtn);
gallery.style.display="none";
}

for(let i=0;i<files.length;i++){
let reader=new FileReader();
reader.onload=function(e){
let img=document.createElement("img");
img.src=e.target.result;
img.onclick=function(){openModal(img.src);}
gallery.appendChild(img);
}
reader.readAsDataURL(files[i]);
}

albumDiv.appendChild(gallery);
document.getElementById("albumsContainer").appendChild(albumDiv);

document.getElementById("albumTitle").value="";
document.getElementById("albumDate").value="";
document.getElementById("albumPassword").value="";
document.getElementById("albumImages").value="";
}

function openModal(src){
document.getElementById("imageModal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeModal(){
document.getElementById("imageModal").style.display="none";
}

</script>

</body>
</html>
